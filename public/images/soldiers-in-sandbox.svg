<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Book cover background -->
  <defs>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5F4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D4A3D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="beigeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4C4A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4B498;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main cover -->
  <rect width="300" height="450" fill="url(#darkGrad)"/>
  
  <!-- Side accent -->
  <rect x="0" y="0" width="60" height="450" fill="url(#beigeGrad)" opacity="0.9"/>
  
  <!-- Horizontal accent -->
  <rect x="0" y="200" width="300" height="50" fill="#F5F1EA" opacity="0.15"/>
  
  <!-- Sand texture -->
  <circle cx="100" cy="80" r="2" fill="#F5F1EA" opacity="0.2"/>
  <circle cx="220" cy="140" r="1.5" fill="#F5F1EA" opacity="0.15"/>
  <circle cx="180" cy="300" r="2" fill="#F5F1EA" opacity="0.18"/>
  <circle cx="250" cy="350" r="1" fill="#F5F1EA" opacity="0.12"/>
  
  <!-- Title -->
  <text x="150" y="170" font-family="Georgia, serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#F5F1EA">
    <tspan x="150" dy="0">Soldiers in</tspan>
    <tspan x="150" dy="35">the Sandbox</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="150" y="250" font-family="Georgia, serif" font-size="14" text-anchor="middle" fill="#F5F1EA" opacity="0.85">
    Continued Reflections
  </text>
  
  <!-- Author name -->
  <text x="150" y="400" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#D4C4A8">
    Scott G. A. Metcalf
  </text>
  
  <!-- Decorative corner lines -->
  <line x1="20" y1="50" x2="40" y2="50" stroke="#F5F1EA" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="50" x2="20" y2="70" stroke="#F5F1EA" stroke-width="1" opacity="0.3"/>
  
  <line x1="280" y1="400" x2="260" y2="400" stroke="#F5F1EA" stroke-width="1" opacity="0.3"/>
  <line x1="280" y1="400" x2="280" y2="380" stroke="#F5F1EA" stroke-width="1" opacity="0.3"/>
</svg>
