<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Book cover background -->
  <defs>
    <linearGradient id="charcoalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D3D3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C2C2C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8E6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A5F4A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main cover -->
  <rect width="300" height="450" fill="url(#charcoalGrad)"/>
  
  <!-- Left border -->
  <rect x="0" y="0" width="8" height="450" fill="url(#accentGrad)"/>
  
  <!-- Center accent panel -->
  <rect x="60" y="120" width="180" height="220" fill="#F5F1EA" opacity="0.08"/>
  
  <!-- Subtle pattern -->
  <circle cx="50" cy="60" r="2" fill="#F5F1EA" opacity="0.15"/>
  <circle cx="250" cy="150" r="1.5" fill="#F5F1EA" opacity="0.1"/>
  <circle cx="100" cy="350" r="2" fill="#F5F1EA" opacity="0.12"/>
  <circle cx="270" cy="300" r="1" fill="#F5F1EA" opacity="0.1"/>
  
  <!-- Title -->
  <text x="150" y="160" font-family="Georgia, serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#F5F1EA">
    <tspan x="150" dy="0">Letter Home</tspan>
    <tspan x="150" dy="35">from the</tspan>
    <tspan x="150" dy="35">Sandbox</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="150" y="280" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#F5F1EA" opacity="0.8">
    Personal Correspondence
  </text>
  
  <!-- Author name -->
  <text x="150" y="400" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#6B8E6B">
    Scott G. A. Metcalf
  </text>
  
  <!-- Envelope flap design -->
  <polygon points="80,100 150,130 220,100" fill="none" stroke="#6B8E6B" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="100" x2="80" y2="130" stroke="#6B8E6B" stroke-width="0.5" opacity="0.3"/>
  <line x1="220" y1="100" x2="220" y2="130" stroke="#6B8E6B" stroke-width="0.5" opacity="0.3"/>
</svg>
