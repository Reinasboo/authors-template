<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Book cover background -->
  <defs>
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8DCC8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4C4A8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brownGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C4033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D2817;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main cover -->
  <rect width="300" height="450" fill="url(#sandGrad)"/>
  
  <!-- Accent stripe -->
  <rect x="0" y="80" width="300" height="200" fill="url(#brownGrad)" opacity="0.8"/>
  
  <!-- Sand texture overlay -->
  <circle cx="30" cy="50" r="2" fill="#3D2817" opacity="0.3"/>
  <circle cx="80" cy="120" r="1.5" fill="#3D2817" opacity="0.2"/>
  <circle cx="250" cy="100" r="2" fill="#3D2817" opacity="0.25"/>
  <circle cx="150" cy="250" r="1" fill="#3D2817" opacity="0.15"/>
  <circle cx="270" cy="350" r="2" fill="#3D2817" opacity="0.2"/>
  
  <!-- Title -->
  <text x="150" y="180" font-family="Georgia, serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#F5F1EA">
    <tspan x="150" dy="0">Letters from</tspan>
    <tspan x="150" dy="35">the Sand</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="150" y="250" font-family="Georgia, serif" font-size="14" text-anchor="middle" fill="#F5F1EA" opacity="0.9">
    A Reflective Memoir
  </text>
  
  <!-- Author name -->
  <text x="150" y="400" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#3D2817">
    Scott G. A. Metcalf
  </text>
  
  <!-- Decorative elements -->
  <line x1="50" y1="330" x2="250" y2="330" stroke="#3D2817" stroke-width="0.5" opacity="0.4"/>
</svg>
